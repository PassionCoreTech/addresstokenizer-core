spring.application.name=addresstokenizer-core-sample
server.port=8080

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Override core defaults if needed (ISO20022 is the default)
# address.confidence.profile=ISO20022
# address.confidence.profile=MARKETING
# address.confidence.profile=CUSTOM
# address.confidence.weights.city=0.35
# address.confidence.weights.country=0.35
# address.confidence.weights.postalCode=0.15
# address.confidence.weights.streetName=0.10
# address.confidence.weights.buildingName=0.05

# Lower the review threshold if your use case is more lenient
# address.tokenizer.confidence-threshold=0.65

